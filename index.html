<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link href="./source/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>

<body>
    <div id="wrapper"
        class="min-h-screen w-screen box-border p-4 text-white bg-gradient-to-br from-blue-400 via-blue-500 to-indigo-600 grid sm:grid-cols-[2fr_8fr] lg:grid-cols-[1fr_9fr]">

        <!-- Left aside bar -->
        <aside id="important-links"
            class="h-full glass rounded-2xl hidden sm:flex sm:flex-col sm:justify-center py-20 gap-8">

            <span id="close" class="material-symbols-outlined text-black font-semibold self-center flex cursor-pointer">close</span>

            <section class="flex flex-col h-full justify-between items-center">

                <button id="currect-location" class="cursor-pointer">
                    <span class="material-symbols-outlined font-semibold">my_location</span>
                    <h2 class="text-black font-semibold">Current</h2>
                </button>

                <button id="changeDegree" class="cursor-pointer">
                    <span class="material-symbols-outlined text-black font-semibold text-9xl">thermometer</span>
                    <h2 id="degree" class="text-3xl text-black font-semibold">°C</h2>
                </button>

                <button id="remove-cities" class="cursor-pointer">
                    <span class="material-symbols-outlined font-semibold">playlist_remove</span>
                    <h2 class="text-black font-semibold">Default Cities</h2>
                </button>

                <button class="cursor-pointer">
                    <span class="material-symbols-outlined font-semibold">my_location</span>
                    <h2 class="text-black font-semibold">Upcoming</h2>
                </button>

            </section>
        </aside>

        <!-- main -->
        <main class="grid grid-cols-1 gap-1 p-2">

            <!-- search -->
            <header class="w-full flex justify-evenly gap-3 items-center py-4 md:flex-none">
                <button class="menu sm:hidden">
                    <span class="material-symbols-outlined font-semibold">menu</span>
                </button>

                <div class="serch-box w-full">

                    <div class="flex justify-between items-center glass text-black font-semibold rounded-full px-5 py-4 focus-within:ring-2 focus-within:ring-blue-400">
                        <input id="city-input" class="outline-none px-2 text-black font-semibold w-full" type="text"
                            placeholder="Enter city">
                        <span id="search" class="material-symbols-outlined text-black font-semibold">search</span>
                    </div>

                    <p id="error-msg" class="text-red-200 text-sm mt-2"></p>

                    <select id="recent-cities"
                        class="mt-2 glass text-black font-semibold p-2 w-full rounded-xl hidden">
                    </select>

                </div>
            </header>

            <!-- current -->
            <section class="glass text-black font-semibold p-2 rounded-4xl flex justify-between sm:justify-around items-center gap-4">

                <div class="text-center md:text-left">
                    <div class="flex gap-2">
                        <span class="material-symbols-outlined font-semibold">air</span>
                        <h2 id="wind">0.3 km/h</h2>
                    </div>

                    <!-- upgraded -->
                    <h2 id="temp" class="text-5xl font-bold tracking-wide">30 °C</h2>
                    <h4 id="condition" class="text-2xl opacity-80">clear</h4>
                </div>

                <div class="text-center">
                    <h3 id="current_date">Wed , 23 Feb</h3>
                    <img id="condition_img" src="assest/clear.svg" alt="weather condition">
                    <h2 id="city-name">London</h2>
                </div>
            </section>

            <!-- forecast -->
            <section class="glass text-black font-semibold px-4 rounded-4xl flex flex-col py-6 gap-2">
                <h2 class="font-semibold text-lg">Upcoming Forecasting</h2>

                <div class="w-full py-2">
                    <div id="forecastItems"
                        class="w-full flex gap-4 items-center overflow-x-auto hide-scroll">

                        <div class="p-4 min-w-30 glass rounded-2xl">
                            <h2>Today</h2>
                            <h2>32 °C</h2>
                            <img src="assest/clouds.svg">
                        </div>

                    </div>
                </div>
            </section>

            <!-- conditions -->
            <section class="glass text-black font-semibold p-4 rounded-4xl">
                <h2 class="font-semibold text-lg">Air Conditions</h2>

                <div class="grid grid-cols-2 gap-6 mt-4">

                    <div>
                        <span class="material-symbols-outlined font-semibold">thermometer</span>
                        <h3>Real Feel</h3>
                        <h2 id="feel">30 °C</h2>
                    </div>

                    <div>
                        <span class="material-symbols-outlined font-semibold">air</span>
                        <h3>Sun Rise</h3>
                        <h2 id="sunrise">05:36 Am</h2>
                    </div>

                    <div>
                        <span class="material-symbols-outlined font-semibold">humidity_low</span>
                        <h3>Humidity</h3>
                        <h2 id="humidity">28 %</h2>
                    </div>

                    <div>
                        <span class="material-symbols-outlined font-semibold">brightness_7</span>
                        <h3>Sun Set</h3>
                        <h2 id="sunset">06:20 PM</h2>
                    </div>

                </div>
            </section>

        </main>
    </div>
    <script src="./source/script.js"></script>
</body>
</html>
